# Standalone compose for running readeck_toolkit on its own.
# For VPS deploy alongside the rest of personal_ai_stack, see
# personal_ai_stack/deploy/readeck-toolkit/.

services:
  bot:
    image: ghcr.io/dzarlax-ai/readeck-toolkit:latest
    restart: always
    command: ["readeck-bot", "-config", "/etc/readeck/config.toml"]
    volumes:
      - ./config.toml:/etc/readeck/config.toml:ro

  mcp:
    image: ghcr.io/dzarlax-ai/readeck-toolkit:latest
    restart: always
    command: ["readeck-mcp"]
    env_file: .env
    ports:
      - "8080:8080"
